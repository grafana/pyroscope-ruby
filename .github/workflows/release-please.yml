on:
  push:
    branches:
      - main

name: Release Please

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      pr: ${{ steps.rp.outputs.pr }}
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      sha: ${{ steps.rp.outputs.sha }}
    steps:
      - id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@580590a644e82e79bb2598bdaba0be245a14dda0 # create-github-app-token/v0.2.2
        with:
          github_app: pyroscope-development-app
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.get-github-app-token.outputs.token }}

  ruby-release-linux:
    permissions:
      contents: write
      id-token: write
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-large' || 'ubuntu-latest' }}
            make-target: linux/amd64
          - name: linux-arm64
            runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-arm64-large' || 'ubuntu-24.04-arm' }}
            make-target: linux/arm64
    name: Release ruby linux - ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.sha }}
          persist-credentials: false
      - run: make ${{ matrix.make-target }}
      - name: Upload release artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" pkg/*.gem --clobber
      - uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '4.0.5'
          bundler: default
      - name: Publish to RubyGems
        run: |
          set -ex
          for gem in pkg/*.gem; do
            gem push "${gem}"
            sleep 5
          done

  ruby-release-macos:
    permissions:
      contents: write
      id-token: write
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - macos-version: "14"
            target: x86_64-apple-darwin
            mk-arch: amd64
          - macos-version: "14"
            target: aarch64-apple-darwin
            mk-arch: arm64

    name: macOS - ${{ matrix.target }}
    runs-on: macos-${{ matrix.macos-version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.sha }}
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '4.0.5'
          bundler: default
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.96.0
          target: ${{ matrix.target }}
      - run: make mac/${{ matrix.mk-arch }}
      - name: Upload release artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" pkg/*.gem --clobber
      - uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0
      - name: Publish to RubyGems
        run: |
          set -ex
          for gem in pkg/*.gem; do
            gem push "${gem}"
            sleep 5
          done

  ruby-release-source:
    permissions:
      contents: write
      id-token: write
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    name: source
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.sha }}
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '4.0.5'
          bundler: default
      - name: Install bundles
        run: bundle
      - name: Build source gem
        run: rake source:gem
      - name: Upload release artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" pkg/*.gem --clobber
      - uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0
      - name: Publish to RubyGems
        run: |
          set -ex
          for gem in pkg/*.gem; do
            gem push "${gem}"
            sleep 5
          done

  publish-github-release:
    permissions:
      contents: write
    name: Publish GitHub release
    needs:
      - release-please
      - ruby-release-linux
      - ruby-release-macos
      - ruby-release-source
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name='${{ needs.release-please.outputs.tag_name }}' \
            -f target_commitish='${{ needs.release-please.outputs.sha }}' \
            --jq .body > release-notes.md
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" \
            --draft=false \
            --repo "${{ github.repository }}" \
            --notes-file release-notes.md

  update-lockfile:
    needs: release-please
    if: needs.release-please.outputs.pr != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@580590a644e82e79bb2598bdaba0be245a14dda0 # create-github-app-token/v0.2.2
        with:
          github_app: pyroscope-development-app
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: release-please--branches--main--components--ruby
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.96.0
      - name: Update Cargo.lock
        run: cargo update --workspace
        working-directory: ext/rbspy
      - name: Commit Cargo.lock through GitHub API
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.get-github-app-token.outputs.token }}
          script: |
            const commitFilesThroughGitHubApi = require('./.github/scripts/commit-files-through-github-api.js');
            await commitFilesThroughGitHubApi({
              github,
              context,
              branchName: 'release-please--branches--main--components--ruby',
              files: ['ext/rbspy/Cargo.lock'],
              message: 'chore: update Cargo.lock',
            });
